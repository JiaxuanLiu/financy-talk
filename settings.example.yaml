# Financy Talk 配置模板
# 使用方法：复制此文件为 settings.yaml 并填入你的配置
#   cp settings.example.yaml settings.yaml
#
# settings.yaml 已被 .gitignore 排除，不会被提交到 GitHub

# DeepSeek API Key（三选一即可，优先级：环境变量 > .env > settings.yaml）
api_key: "your-api-key-here"

# 三级模型对应不同分析深度，可替换为任意 OpenAI 兼容模型
models:
  haiku:                    # 快速模式（轻量分析）
    model: deepseek-v4-flash
    max_tokens: 2000

  sonnet:                   # 标准模式（单 talker 分析）
    model: deepseek-v4-flash
    max_tokens: 4000

  opus:                     # 深度模式（多 talker 对比）
    model: deepseek-v4-flash
    max_tokens: 8000
